<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ESPN ASIGNACIONES FIFA WC 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F4FF;
  --bg2:#ffffff;
  --bg3:#E4EAF8;
  --bg4:#DDE4F5;
  --hdr:#0C0C14;
  --red:#E8003D;
  --red-dim:rgba(232,0,61,.07);
  --red-bd:rgba(232,0,61,.22);
  --gold:#c9a227;
  --gold-dim:rgba(201,162,39,.1);
  --gold-bd:rgba(201,162,39,.35);
  --blue:#0050C8;
  --blue-dim:rgba(0,80,200,.06);
  --blue-bd:rgba(0,80,200,.18);
  --cyan:#00B4E0;
  --amber:#C87800;
  --amber-dim:rgba(200,120,0,.07);
  --amber-bd:rgba(200,120,0,.22);
  --green:#00A855;
  --t:#0A0A1E;
  --t2:#4A4A6E;
  --t3:#8A8AAA;
  --b:rgba(0,0,0,.07);
  --b2:rgba(0,0,0,.13);
  --r:12px;
  --rsm:8px;
  --rpill:999px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-sm:0 1px 6px rgba(0,0,0,.06);
}
html,body{background:var(--bg);color:var(--t);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}
body{padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:0 0 56px}

/* ── HEADER ───────────────────────────────────────────────── */
.hdr{
  background:var(--hdr);
  border-bottom:2px solid var(--red);
  padding:16px 16px 0;
  position:sticky;top:0;z-index:100;
}
.hdr-top{position:relative;display:flex;align-items:center;justify-content:flex-end;margin-bottom:14px;min-height:48px}
.hdr-l{position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;pointer-events:none}
.espn-badge{flex-shrink:0;display:flex;align-items:center}
.htitle{font-size:14px;font-weight:700;color:#ffffff;letter-spacing:.2px}
.hsub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.rbtn{
  background:rgba(255,255,255,.08);
  border:0.5px solid rgba(255,255,255,.18);
  border-radius:8px;
  padding:7px 9px;
  cursor:pointer;
  color:rgba(255,255,255,.6);
  font-size:13px;
  flex-shrink:0;
}
.rbtn:active{opacity:.6}
.rbtn.spin i{display:inline-block;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── CHANNEL TOGGLE ───────────────────────────────────────── */
.ch-strip{
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding-bottom:12px;
  scrollbar-width:none;
}
.ch-strip::-webkit-scrollbar{display:none}
.chbtn{
  flex-shrink:0;
  background:transparent;
  border:1px solid rgba(255,255,255,.18);
  border-radius:var(--rpill);
  padding:6px 14px;
  font-size:12px;
  font-weight:600;
  color:rgba(255,255,255,.45);
  cursor:pointer;
  font-family:inherit;
  transition:all .15s;
  letter-spacing:.3px;
  text-transform:uppercase;
}
.chbtn:active{opacity:.7}
.chbtn.sel{
  background:var(--red);
  border-color:var(--red);
  color:#ffffff;
}

/* ── SYNC ROW ──────────────────────────────────────────────── */
.srow{padding:10px 16px 0;display:none}
.spill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);background:var(--bg2);border:0.5px solid var(--b);border-radius:var(--rpill);padding:3px 9px;box-shadow:var(--shadow-sm)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.err{background:var(--red)}

/* ── BANNER ──────────────────────────────────────────────── */
.cbanner{
  background:rgba(201,162,39,.07);
  border-left:3px solid var(--gold);
  padding:11px 14px;
  margin:12px 16px 0;
  border-radius:0 var(--rsm) var(--rsm) 0;
}
.cbanner p{font-size:11px;color:var(--amber);line-height:1.6}
.cbanner code{background:rgba(201,162,39,.12);padding:1px 5px;border-radius:3px;font-size:10px}

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main-pad{padding:14px 16px 0}
.tabs{display:flex;background:var(--bg2);border-radius:var(--rsm);padding:3px;margin-bottom:14px;border:1px solid var(--b);box-shadow:var(--shadow-sm)}
.tab{flex:1;background:transparent;border:none;color:var(--t3);font-size:12px;padding:7px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.tab.sel{background:var(--red);color:#ffffff;font-weight:700}
.dstrip,.pstrip{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.dstrip::-webkit-scrollbar,.pstrip::-webkit-scrollbar{display:none}
.dbtn{
  flex-shrink:0;
  background:var(--bg2);
  border:1px solid var(--b);
  border-radius:var(--rsm);
  padding:6px 8px;
  min-width:46px;
  text-align:center;
  cursor:pointer;
  font-family:inherit;
  transition:all .15s;
  box-shadow:var(--shadow-sm);
}
.dbtn:active{opacity:.6}
.dbtn.sel{background:var(--red-dim);border-color:var(--red-bd)}
.dbtn.nd{opacity:.3}
.dn{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.dd{font-size:14px;font-weight:700;color:var(--t);margin-top:1px}
.dm{font-size:7px;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-top:1px}
.ddot{width:4px;height:4px;border-radius:50%;margin:3px auto 0}
.dbtn.sel .dn,.dbtn.sel .dd,.dbtn.sel .dm{color:var(--red)}
.dbtn.sel .ddot{background:var(--red)}
.slbl{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slbl span{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--t3)}

/* ── CARDS ───────────────────────────────────────────────── */
.card{display:flex;border-radius:var(--r);overflow:hidden;margin-bottom:8px;border:1px solid var(--b);background:var(--bg2);box-shadow:var(--shadow)}
.cstrip{width:3px;flex-shrink:0}
.cbody{display:flex;gap:12px;padding:11px 13px;flex:1;align-items:flex-start}
.ctime{flex-shrink:0}
.card-air{background:var(--bg2);border-color:rgba(0,80,200,.15)}
.card-air .cstrip{background:var(--blue)}
.card-ev{background:var(--bg2);border-color:rgba(200,120,0,.18)}
.card-ev .cstrip{background:var(--amber)}
.card-libre .cstrip{background:var(--b2)}
.chip{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--b);border-radius:var(--rpill);padding:4px 10px;font-size:14px;color:var(--t2);margin:2px 3px 2px 0}
.chip-c{cursor:pointer}
.chip-c:active{opacity:.6}
.pbtn{flex-shrink:0;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rpill);padding:8px 16px;font-size:14px;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;box-shadow:var(--shadow-sm)}
.pbtn:active{opacity:.6}
.pbtn.sel{background:var(--red-dim);border-color:var(--red-bd);color:var(--red);font-weight:700}

/* ── STATS ───────────────────────────────────────────────── */
.stats{display:flex;background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:13px;margin-bottom:14px;box-shadow:var(--shadow)}
.stat{flex:1;text-align:center}
.stat+.stat{border-left:1px solid var(--b)}
.sv{font-size:19px;font-weight:700;color:var(--t)}
.sl{font-size:10px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* ── EMPTY / LOADING / ERROR ──────────────────────────────── */
.empty{text-align:center;padding:50px 20px}
.empty i{font-size:28px;color:var(--t3)}
.empty p{font-size:12px;color:var(--t2);margin-top:10px;line-height:1.5}
.lscr{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spin2{width:28px;height:28px;border:2px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:rot .7s linear infinite}
.ltxt{font-size:12px;color:var(--t2)}
.ebox{background:var(--red-dim);border:1px solid var(--red-bd);border-radius:var(--r);padding:20px;text-align:center;margin:20px 16px}
.ebox i{font-size:24px;color:var(--red)}
.ebox p{font-size:12px;color:var(--t2);margin:8px 0 14px;line-height:1.5}
.ebtn{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rsm);padding:8px 18px;font-size:12px;color:var(--t);cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm)}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-l">
        <div>
          <div style="font-size:28px;font-weight:900;font-style:italic;color:#E8003D;font-family:'Arial Black','Franklin Gothic Heavy','Impact',Arial,sans-serif;letter-spacing:-1px;text-align:center;line-height:1">ESPN</div>
          <div style="font-size:16px;font-weight:700;color:#ffffff;letter-spacing:.3px;margin-top:3px;text-align:center;white-space:nowrap">ASIGNACIONES FIFA&nbsp;WC</div>
        </div>
      </div>
      <button class="rbtn" id="rbtn" onclick="loadChannel(true)"><i class="ti ti-refresh"></i></button>
    </div>
    <!-- Channel toggle -->
    <div class="ch-strip" id="chstrip"></div>
  </div>

  <!-- SYNC -->
  <div class="srow" id="srow">
    <span class="spill"><span class="sdot" id="sdot"></span><span id="stxt"></span></span>
  </div>

  <!-- BANNER -->
  <div id="cbanner" class="cbanner" style="display:none">
    <p>⚙️ <strong>Configuración pendiente:</strong> reemplazá <code>PEGAR_URL_AQUI</code> con la URL de tu Apps Script. Mostrando datos de ejemplo.</p>
  </div>

  <!-- MAIN -->
  <div id="main" style="display:none" class="main-pad">
    <div class="tabs">
      <button class="tab sel" id="tb-d" onclick="setTab('day')">Por día</button>
      <button class="tab" id="tb-p" onclick="setTab('person')">Por persona</button>
    </div>
    <div class="dstrip" id="dp"></div>
    <div id="vd"></div>
    <div id="vp" style="display:none">
      <div class="pstrip" id="pp"></div>
      <div id="ps"></div>
    </div>
  </div>

  <div id="lscr" class="lscr"><div class="spin2"></div><div class="ltxt">Cargando grilla…</div></div>

  <div id="escr" style="display:none">
    <div class="ebox">
      <i class="ti ti-wifi-off"></i>
      <p>No se pudo cargar la grilla.<br>Verificá tu conexión o la URL del Apps Script.</p>
      <button class="ebtn" onclick="loadChannel(true)">Reintentar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyEAJJHdKmMXS14f_XZ2hobJhmeYhi_aNEBnnZOvEupCB_4OyhbB7UaCvnK9GvQu13hRQ/exec';

// ── CANALES ───────────────────────────────────────────────────────────────────
const CHANNELS = [
  { id: 'ARG',      label: 'Argentina',      short: 'ARG'       },
  { id: 'COL',      label: 'Colombia',        short: 'COL'       },
  { id: 'PARTIDOS', label: 'Partidos FIFA WC', short: 'PARTIDOS' },
  { id: 'Regiones', label: 'Regiones',        short: 'REGIONES'  },
  { id: 'Cobra',    label: 'La Cobra / Kun',  short: 'COBRA/KUN' },
];

// ── COLORES CIUDAD ────────────────────────────────────────────────────────────
const LC = {
  FL:'#06b6d4', KC:'#a78bfa', DAL:'#fb923c', MX:'#4ade80',
  NY:'#f87171', GUA:'#fbbf24', BSAS:'#94a3b8',
  BOG:'#34d399', MED:'#f472b6', CAL:'#60a5fa', BUC:'#f97316'
};

// ── DATOS DEMO ────────────────────────────────────────────────────────────────
const DEMO = {
  ARG: {'08/06':{slots:[
    {t:'07:00',e:'09:00',p:['Ferreira','P. Gonzalez','Luciana'],loc:{Ferreira:'FL','P. Gonzalez':'DAL',Luciana:'MX'}},
    {t:'09:00',e:'11:00',p:['Paoloski','Poggi','Coquet','Espina'],loc:{Paoloski:'FL',Poggi:'KC',Coquet:'NY',Espina:'DAL'}},
    {t:'11:00',e:'13:00',p:['Closs','Latorre','Edul'],loc:{Closs:'FL',Latorre:'GUA',Edul:'KC'}},
    {t:'15:00',e:'16:00',p:['Lopez','Souto'],loc:{Lopez:'DAL',Souto:'KC'}},
    {t:'16:00',e:'18:00',ev:'Francia vs. Irlanda',rel:'Marcelo Benedetto',com:'Pablo Cavallero',campo:'Lucas Bourdieu'},
    {t:'19:00',e:'20:30',p:['Closs','Edul','Souto','Morena'],loc:{Closs:'FL',Edul:'KC',Souto:'KC',Morena:'FL'}},
    {t:'23:00',e:'01:00',ev:'Perú vs. España',rel:'Fernando Palomo',com:'Rodolfo Landeros',campo:'Diego Neri'},
  ]}},
  COL: {'08/06':{slots:[
    {t:'07:00',e:'09:00',p:['Conductor COL 1','Conductor COL 2'],loc:{'Conductor COL 1':'BOG','Conductor COL 2':'MED'}},
    {t:'16:00',e:'18:00',ev:'Francia vs. Irlanda',rel:'Relator COL',com:'Comentarista COL',campo:'Campo COL'},
    {t:'19:00',e:'21:00',p:['Conductor COL 1','Conductor COL 3'],loc:{'Conductor COL 1':'BOG','Conductor COL 3':'CAL'}},
  ]}},
  Regiones: {'08/06':{slots:[
    {t:'07:00',e:'09:00',p:['Conductor Reg 1','Conductor Reg 2'],loc:{'Conductor Reg 1':'MX','Conductor Reg 2':'GUA'}},
    {t:'20:00',e:'22:00',ev:'Argentina vs. Colombia',rel:'Relator Reg',com:'Comentarista Reg',campo:'Campo Reg'},
  ]}},
  Cobra: {'08/06':{slots:[
    {t:'08:00',e:'10:00',p:['Slakun','La Cobra'],loc:{Slakun:'MX','La Cobra':'MX'}},
    {t:'18:00',e:'20:00',p:['Slakun','La Cobra','Invitado'],loc:{Slakun:'MX','La Cobra':'MX',Invitado:'MX'}},
  ]}},
  PARTIDOS: {'08/06':{slots:[
    {t:'16:00',e:'18:00',ev:'Francia vs. Irlanda',rel:'Marcelo Benedetto',com:'Pablo Cavallero',campo:'Lucas Bourdieu',desde:'ON SITE'},
    {t:'19:00',e:'21:00',ev:'España vs. Portugal',rel:'Fernando Palomo',com:'Rodolfo Landeros',campo:'Diego Neri',desde:'IBC Dallas'},
    {t:'23:00',e:'01:00',ev:'Perú vs. Ecuador',rel:'Closs',com:'Latorre',campo:'Edul',desde:'W'},
  ]}},
};

// ── ESTADO ────────────────────────────────────────────────────────────────────
const DS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DF=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MES_LARGO=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
let ALL_DATA={}, selChannel='ARG', selDay='08/06', selPer=null, tab='day';

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toM(t){const[h,m]=t.split(':').map(Number);return h<5?h*60+m+1440:h*60+m}
function parseDDMM(ddmm){const[d,m]=ddmm.split('/').map(Number);return new Date(2026,m-1,d)}
let _DATES=null;
function allDates(){if(!_DATES){const r=[];const s=new Date(2026,5,8);const e=new Date(2026,6,19);for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){r.push(String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'))}_DATES=r;}return _DATES;}
function fmtDayLong(ddmm){const dt=parseDDMM(ddmm);return DF[dt.getDay()]+' '+dt.getDate()+' de '+MES_LARGO[dt.getMonth()]}
function cvt(t,off){const[h,m]=t.split(':').map(Number);let n=h*60+m+off;if(n<0)n+=1440;if(n>=1440)n-=1440;return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0')}
function dstr(t1,t2){const d=toM(t2)-toM(t1),h=Math.floor(d/60),m=d%60;return h&&m?`${h}h ${m}m`:h?`${h}h`:`${m}m`}
function curData(){return ALL_DATA[selChannel]||{}}
function allPersons(){
  const s=new Set();
  Object.values(ALL_DATA).forEach(chData=>
    Object.values(chData).forEach(d=>d.slots&&d.slots.forEach(sl=>{
      if(sl.p)sl.p.forEach(n=>s.add(n));
      if(sl.ev){if(sl.rel)s.add(sl.rel);if(sl.com)s.add(sl.com);if(sl.campo)s.add(sl.campo);}
    }))
  );
  return[...s].sort((a,b)=>a.localeCompare(b,'es'));
}

function locTag(loc){
  if(!loc)return'';
  const c=LC[loc]||'#888';
  return `<span style="font-size:8px;background:${c};color:#fff;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:700;letter-spacing:.3px">${loc}</span>`;
}
function chip(name,slot,clickable=false){
  const loc=slot?.loc?.[name]||null;
  const cl='chip'+(clickable?' chip-c':'');
  const ev=clickable?`onclick="goPerson('${name.replace(/'/g,"&#39;")}')" `:'';
  return`<span class="${cl}" ${ev}>${name}${locTag(loc)}</span>`;
}
function tzBlock(t){
  const mia=cvt(t,-60),kd=cvt(t,-120),mx=cvt(t,-180);
  const R=(v,l,big)=>`<div style="display:flex;align-items:baseline;gap:3px;line-height:1"><span style="font-size:${big?'20px':'12px'};font-weight:${big?'800':'400'};color:${big?'var(--t)':'var(--t3)'}">${v}</span><span style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding-bottom:1px">${l}</span></div>`;
  return`<div style="display:flex;flex-direction:column;gap:4px">${R(t,'ARG',true)}${R(mia,'MIA',false)}${R(kd,'KC·DAL',false)}${R(mx,'MX',false)}</div>`;
}
function tzRange(s,e){
  const mias=cvt(s,-60),miae=cvt(e,-60),kds=cvt(s,-120),kde=cvt(e,-120),mxs=cvt(s,-180),mxe=cvt(e,-180);
  const R=(vs,ve,l,big)=>`<div style="display:flex;align-items:baseline;gap:3px;line-height:1"><span style="font-size:${big?'15px':'11px'};font-weight:${big?'700':'400'};color:${big?'var(--t)':'var(--t3)'}">${vs}–${ve}</span><span style="font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding-bottom:1px">${l}</span></div>`;
  return`<div style="display:flex;flex-direction:column;gap:4px">${R(s,e,'ARG',true)}${R(mias,miae,'MIA',false)}${R(kds,kde,'KC·DAL',false)}${R(mxs,mxe,'MX',false)}</div>`;
}

// ── CHANNEL PICKER ────────────────────────────────────────────────────────────
function renderChannels(){
  const strip=document.getElementById('chstrip');
  strip.innerHTML='';
  CHANNELS.forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='chbtn'+(ch.id===selChannel?' sel':'');
    btn.textContent=ch.short;
    btn.onclick=()=>{
      selChannel=ch.id; selPer=null; renderChannels();
      if(ALL_DATA[ch.id]){initUI();fetchOne(ch.id).then(()=>initUI()).catch(console.error);}
      else loadAll(false);
    };
    strip.appendChild(btn);
  });
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function fetchOne(chId,bust=false){
  const url=SHEET_URL+'?sheet='+chId+(bust?'&t='+Date.now():'');
  const res=await fetch(url,{redirect:'follow'});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const json=await res.json();
  if(json.error)throw new Error(json.error);
  ALL_DATA[chId]=json;
}

async function loadAll(force=false){
  document.getElementById('rbtn').classList.add('spin');
  const hasCache=Object.keys(ALL_DATA).length>0;
  if(!hasCache){
    document.getElementById('lscr').style.display='';
    document.getElementById('main').style.display='none';
    document.getElementById('escr').style.display='none';
  }
  if(!SHEET_URL||SHEET_URL==='PEGAR_URL_AQUI'){
    document.getElementById('cbanner').style.display='';
    ALL_DATA=DEMO;
    showSync('Datos de ejemplo',false);
    initUI();
    document.getElementById('rbtn').classList.remove('spin');
    return;
  }
  try{
    await Promise.all(CHANNELS.map(ch=>fetchOne(ch.id,force)));
    const now=new Date();
    showSync(now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),false);
    initUI();
  }catch(err){
    console.error(err);
    if(!hasCache){
      document.getElementById('lscr').style.display='none';
      document.getElementById('escr').style.display='';
    }else{
      showSync('Error al actualizar · datos previos',true);
      initUI();
    }
  }
  document.getElementById('rbtn').classList.remove('spin');
}

function loadChannel(force=false){loadAll(force);}

function showSync(text,err){
  document.getElementById('srow').style.display='';
  document.getElementById('stxt').textContent=text;
  document.getElementById('sdot').className='sdot'+(err?' err':'');
}

function initUI(){
  document.getElementById('lscr').style.display='none';
  document.getElementById('escr').style.display='none';
  document.getElementById('main').style.display='';
  const DATES=allDates();
  const today=new Date();
  const todayStr=String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0');
  selDay=DATES.includes(todayStr)?todayStr:DATES[0];
  if(tab==='person'&&!allPersons().includes(selPer)) selPer=null;
  renderDP(); renderDS();
  if(tab==='person'){renderPP();renderPS();}
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function setTab(t){
  tab=t;
  document.getElementById('tb-d').className='tab'+(t==='day'?' sel':'');
  document.getElementById('tb-p').className='tab'+(t==='person'?' sel':'');
  document.getElementById('vd').style.display=t==='day'?'':'none';
  document.getElementById('vp').style.display=t==='person'?'':'none';
  if(t==='person'){if(!selPer)selPer=allPersons()[0];renderPP();renderPS();}
}
function goPerson(name){selPer=name;setTab('person');window.scrollTo({top:0,behavior:'smooth'})}

// ── DAY PICKER ────────────────────────────────────────────────────────────────
function renderDP(){
  const dp=document.getElementById('dp');dp.innerHTML='';
  const DATES=allDates();
  DATES.forEach((ddmm)=>{
    const dt=parseDDMM(ddmm),act=ddmm===selDay,has=!!curData()[ddmm];
    const mesAbr=dt.getMonth()===5?'JUN':'JUL';
    const btn=document.createElement('button');
    btn.className='dbtn'+(act?' sel':'')+(has?'':' nd');
    btn.innerHTML=`<div class="dn">${DS[dt.getDay()]}</div><div class="dd">${dt.getDate()}</div><div class="dm">${mesAbr}</div><div class="ddot" style="background:${has?(act?'var(--gold)':'rgba(201,162,39,.4)'):'transparent'}"></div>`;
    btn.onclick=()=>{selDay=ddmm;renderDP();renderDS();if(tab==='person')renderPS()};
    dp.appendChild(btn);
  });
  const idx=DATES.indexOf(selDay);
  const el=idx>=0?dp.querySelectorAll('.dbtn')[idx]:null;
  if(el)dp.scrollLeft=el.offsetLeft-dp.clientWidth/2+el.offsetWidth/2;
}

// ── DAY VIEW ──────────────────────────────────────────────────────────────────
function renderDS(){
  const c=document.getElementById('vd'),day=curData()[selDay];
  const dayLong=fmtDayLong(selDay);
  if(!day){
    c.innerHTML=`<div class="empty"><i class="ti ti-calendar-off"></i><p>${dayLong}<br>Sin datos en la planilla</p></div>`;return;
  }
  let h=`<div class="slbl"><span>${dayLong}</span><span>${day.slots.length} ${selChannel==='PARTIDOS'?'partidos':'turnos'}</span></div>`;
  day.slots.forEach(s=>{
    const dur=dstr(s.t,s.e);
    const tblock=`<div>${tzBlock(s.t)}<div style="font-size:9px;color:var(--t3);margin-top:4px">${dur}</div></div>`;
    if(s.ev){
      const DESDE_C={'ON SITE':'#16A34A','IBC Dallas':'#EA580C','W':'#94A3B8','KANSAS':'#7C3AED'};
      const dc=DESDE_C[s.desde]||'#94A3B8';
      const desdeBadge=s.desde?`<span style="font-size:9px;background:${dc};color:#fff;border-radius:4px;padding:2px 6px;font-weight:700;letter-spacing:.3px;white-space:nowrap;flex-shrink:0">${s.desde}</span>`:'';
      const evTime=s.e?tzRange(s.t,s.e):tblock;
      function chipEv(name,loc){if(!name)return'';const n=name.replace(/'/g,"&#39;");return`<span class="chip chip-c" onclick="goPerson('${n}')">${name}${locTag(loc)}</span>`;}
      const crew=[
        (s.rel||s.com)?`<div style="display:flex;align-items:center;gap:4px;margin-top:6px;flex-wrap:wrap"><i class="ti ti-microphone-2" style="font-size:13px;color:var(--amber);flex-shrink:0"></i>${s.rel?chipEv(s.rel,s.locRel):''}${s.com?chipEv(s.com,s.locCom):''}</div>`:'',
        s.campo?`<div style="display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap"><i class="ti ti-map-pin" style="font-size:13px;color:var(--t3);flex-shrink:0"></i>${chipEv(s.campo,s.locCampo)}</div>`:''
      ].join('');
      const paisesBadges=s.paises&&s.paises.length?`<div style="display:flex;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap"><span style="font-size:11px;color:var(--t3);margin-right:2px">Regiones:</span>${s.paises.map(p=>`<span style="font-size:10px;background:var(--bg3);color:var(--t2);border:0.5px solid var(--b2);border-radius:var(--rpill);padding:3px 8px;font-weight:500">${p}</span>`).join('')}</div>`:'';
      h+=`<div class="card card-ev"><div class="cstrip"></div><div class="cbody">
        <div class="ctime" style="min-width:80px">${evTime}</div>
        <div style="flex:1;padding-top:1px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <i class="ti ti-ball-football" style="font-size:13px;color:var(--amber);flex-shrink:0"></i>
            <span style="font-size:13px;font-weight:600;color:var(--amber);flex:1;min-width:0">${s.ev}</span>
            ${desdeBadge}
          </div>${crew}${paisesBadges}
        </div>
      </div></div>`;
    }else{
      const chips=s.p.map(n=>chip(n,s,true)).join(' ');
      h+=`<div class="card card-air"><div class="cstrip"></div><div class="cbody">
        <div class="ctime" style="min-width:80px">${tblock}</div>
        <div style="flex:1;padding-top:2px;flex-wrap:wrap">${chips}</div>
      </div></div>`;
    }
  });
  c.innerHTML=h;
}

// ── PERSON VIEW ───────────────────────────────────────────────────────────────
function renderPP(){
  const pp=document.getElementById('pp');pp.innerHTML='';
  const personLoc={};
  Object.values(ALL_DATA).forEach(chData=>
    Object.values(chData).forEach(d=>d.slots&&d.slots.forEach(sl=>{
      if(sl.p&&sl.loc) sl.p.forEach(n=>{if(!personLoc[n]&&sl.loc[n])personLoc[n]=sl.loc[n]});
      if(sl.ev){
        if(sl.rel&&sl.locRel&&!personLoc[sl.rel])personLoc[sl.rel]=sl.locRel;
        if(sl.com&&sl.locCom&&!personLoc[sl.com])personLoc[sl.com]=sl.locCom;
        if(sl.campo&&sl.locCampo&&!personLoc[sl.campo])personLoc[sl.campo]=sl.locCampo;
      }
    }))
  );
  allPersons().forEach(name=>{
    const loc=personLoc[name],c=loc?LC[loc]:null;
    const btn=document.createElement('button');
    btn.className='pbtn'+(name===selPer?' sel':'');
    btn.innerHTML=name+(loc?`<span style="font-size:8px;background:${c};color:#fff;border-radius:3px;padding:1px 5px;margin-left:4px;font-weight:700">${loc}</span>`:'');
    btn.onclick=()=>{selPer=name;renderPP();renderPS()};
    pp.appendChild(btn);
  });
  const el=[...pp.querySelectorAll('.pbtn')].find(b=>b.textContent.startsWith(selPer||''));
  if(el)pp.scrollLeft=el.offsetLeft-pp.clientWidth/2+el.offsetWidth/2;
}

function renderPS(){
  const c=document.getElementById('ps');
  if(!selPer){c.innerHTML='';return;}

  const allBlocks=[];
  Object.entries(ALL_DATA).forEach(([chId,chData])=>{
    const day=chData[selDay];
    if(!day)return;
    day.slots.forEach(sl=>{
      if(sl.p&&sl.p.includes(selPer)){
        allBlocks.push({chId,slot:sl,co:sl.p.filter(n=>n!==selPer)});
      }
      if(sl.ev&&(sl.rel===selPer||sl.com===selPer||sl.campo===selPer)){
        const role=sl.rel===selPer?'relator':sl.com===selPer?'comentarista':'campo';
        allBlocks.push({chId,slot:sl,isPartido:true,role});
      }
    });
  });

  if(!allBlocks.length){
    c.innerHTML=`<div class="empty"><i class="ti ti-user-off"></i><p>${selPer} no tiene turno el ${fmtDayLong(selDay)}</p></div>`;
    return;
  }

  allBlocks.sort((a,b)=>toM(a.slot.t)-toM(b.slot.t));

  const totalM=allBlocks.reduce((acc,b)=>acc+toM(b.slot.e)-toM(b.slot.t),0);
  const h0=Math.floor(totalM/60),m0=totalM%60;
  const ts=h0&&m0?`${h0}h ${m0}m`:h0?`${h0}h`:`${m0}m`;
  const ld=allBlocks.slice(-1)[0]?.slot.e||'—';
  let loc=null;
  for(const b of allBlocks){
    if(b.isPartido){const sl=b.slot;loc=(sl.rel===selPer?sl.locRel:sl.com===selPer?sl.locCom:sl.locCampo)||null;}
    else loc=b.slot.loc?.[selPer]||null;
    if(loc)break;
  }
  const lcol=loc?LC[loc]:null;
  const locPill=loc?`<span style="font-size:10px;font-weight:700;background:${lcol};color:#fff;border-radius:4px;padding:2px 8px;margin-left:8px">${loc}</span>`:'';
  const dt=parseDDMM(selDay);

  const CH_COLOR={ARG:'var(--gold)',COL:'var(--green)',PARTIDOS:'var(--red)',Regiones:'var(--blue)',Cobra:'var(--amber)'};
  function chBadge(chId){
    const ch=CHANNELS.find(c=>c.id===chId);
    const col=CH_COLOR[chId]||'var(--t3)';
    return `<span style="font-size:9px;font-weight:700;color:${col};border:0.5px solid ${col};border-radius:3px;padding:1px 6px;margin-left:6px;letter-spacing:.3px">${ch?ch.short:chId}</span>`;
  }

  let h=`<div style="display:flex;align-items:center;margin-bottom:14px">
    <span style="font-size:14px;font-weight:700;color:var(--t)">${selPer}</span>${locPill}
  </div>
  <div class="stats">
    <div class="stat"><div class="sv">${allBlocks.length}</div><div class="sl">Turno${allBlocks.length!==1?'s':''}</div></div>
    <div class="stat"><div class="sv">${ts}</div><div class="sl">Al aire</div></div>
    <div class="stat"><div class="sv" style="font-size:14px;padding-top:3px">${ld}</div><div class="sl">Libre desde</div></div>
  </div>
  <div class="slbl"><span>${DF[dt.getDay()]} ${selDay} de ${MES_LARGO[dt.getMonth()]}</span></div>`;

  allBlocks.forEach(b=>{
    const sl=b.slot;
    const dur=sl.t&&sl.e?dstr(sl.t,sl.e):'';
    const tblk=`<div>${sl.t&&sl.e?tzRange(sl.t,sl.e):tzBlock(sl.t||'00:00')}<div style="font-size:9px;color:var(--t3);margin-top:3px">${dur}</div></div>`;
    if(b.isPartido){
      const otherCrew=[];
      if(sl.rel&&sl.rel!==selPer)otherCrew.push({name:sl.rel,loc:sl.locRel});
      if(sl.com&&sl.com!==selPer)otherCrew.push({name:sl.com,loc:sl.locCom});
      if(sl.campo&&sl.campo!==selPer)otherCrew.push({name:sl.campo,loc:sl.locCampo});
      const crewHtml=otherCrew.length?`<div style="margin-top:5px;font-size:10px;color:var(--t3)">Con: ${otherCrew.map(x=>`<span class="chip" style="font-size:12px">${x.name}${locTag(x.loc)}</span>`).join('')}</div>`:'';
      h+=`<div class="card card-ev"><div class="cstrip"></div><div class="cbody">
        <div class="ctime" style="min-width:100px">${tblk}</div>
        <div style="flex:1;padding-top:1px">
          <div style="font-size:12px;font-weight:600;color:var(--amber);display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            <i class="ti ti-ball-football" style="font-size:12px;vertical-align:-2px"></i>${sl.ev}${chBadge(b.chId)}
          </div>
          <div style="font-size:10px;color:var(--t3);margin-top:3px;text-transform:capitalize">${b.role}</div>
          ${crewHtml}
        </div>
      </div></div>`;
    }else{
      const co=b.co.length
        ?`<div style="margin-top:5px;font-size:10px;color:var(--t3)">Con: ${b.co.map(n=>chip(n,sl,false)).join(' ')}</div>`
        :'<div style="margin-top:4px;font-size:10px;color:var(--t3)">Turno solo</div>';
      h+=`<div class="card card-air"><div class="cstrip"></div><div class="cbody">
        <div class="ctime" style="min-width:100px">${tblk}</div>
        <div style="flex:1;padding-top:1px">
          <div style="font-size:12px;font-weight:600;color:var(--blue);display:flex;align-items:center">
            <i class="ti ti-microphone" style="font-size:12px;vertical-align:-2px;margin-right:3px"></i>Al aire${chBadge(b.chId)}
          </div>${co}
        </div>
      </div></div>`;
    }
  });
  c.innerHTML=h;
}

// ── AUTO-REFRESH (30 min) ─────────────────────────────────────────────────────
const AUTO_MS=30*60*1000;
let autoTimer=null;
function scheduleAuto(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{loadAll(false);scheduleAuto();},AUTO_MS);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderChannels();
loadAll();
scheduleAuto();
</script>
</body>
</html>
